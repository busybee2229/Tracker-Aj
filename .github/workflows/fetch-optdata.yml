name: Fetch option price & details
on:
  schedule:
    - cron: "15 */6 * * *"   # every 6 hours (UTC)
  workflow_dispatch:
permissions:
  contents: write
jobs:
  optdata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Fetch per-option price/image/title (scrapable retailers only)
        run: node scripts/fetch-optdata.mjs
      - name: Commit if changed
        run: |
          git config user.name  "baby-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add optdata.json
          git diff --staged --quiet && echo "no optdata changes" && exit 0
          git commit -m "auto: option price/details $(date -u +%F)"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash -X theirs origin main && git push && exit 0
            echo "push race, retry $i…"; sleep 5
          done
          echo "push failed after retries"; exit 1
