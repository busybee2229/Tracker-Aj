name: Generate pros/cons
on:
  schedule:
    - cron: "30 4 * * *"   # once daily (UTC) — picks up newly added items
  workflow_dispatch:        # run manually from the Actions tab for instant
permissions:
  contents: write
jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Generate missing pros/cons (Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/gen-proscons.mjs
      - name: Commit if changed
        run: |
          git config user.name  "baby-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add proscons.json
          git diff --staged --quiet && echo "no new pros/cons" && exit 0
          git commit -m "auto: pros/cons for new items $(date -u +%F)"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash -X theirs origin main && git push && exit 0
            echo "push race, retry $i…"; sleep 5
          done
          echo "push failed after retries"; exit 1
