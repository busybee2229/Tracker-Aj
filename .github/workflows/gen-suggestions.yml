name: Generate suggestions
on:
  schedule:
    - cron: "45 4 * * *"   # once daily (UTC)
  workflow_dispatch:        # run manually for fresh suggestions on demand
permissions:
  contents: write
jobs:
  suggest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Generate suggestions for under-filled items (Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/gen-suggestions.mjs
      - name: Commit if changed
        run: |
          git config user.name  "baby-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add suggestions.json
          git diff --staged --quiet && echo "no suggestion changes" && exit 0
          git commit -m "auto: suggestions $(date -u +%F)"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash -X theirs origin main && git push && exit 0
            echo "push race, retry $i…"; sleep 5
          done
          echo "push failed after retries"; exit 1
