name: Backup shared state
on:
  schedule:
    - cron: "0 3 * * *"   # once daily (UTC)
  workflow_dispatch:
permissions:
  contents: write
jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read shared row and write backup
        run: |
          # Anon read key is already public (shipped in app.js); read-only by RLS.
          URL="https://nrpjtychwmuecmskehyj.supabase.co"
          KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ycGp0eWNod211ZWNtc2tlaHlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNDMyMDUsImV4cCI6MjA5NzYxOTIwNX0.g-WGgUyrHLwql4ZqcNjVvCuT1TzcNIo1z6NNIdVNE9s"
          curl -s "$URL/rest/v1/tracker_state?id=eq.shared&select=data" \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps((d[0]['data'] if d else {}), indent=2))" \
            > state-backup.json
      - name: Commit if changed
        run: |
          git config user.name  "baby-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state-backup.json
          git diff --staged --quiet || git commit -m "state backup $(date -u +%F)"
          git push
