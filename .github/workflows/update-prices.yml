name: Update baby prices
on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours (UTC) — catches sales sooner on scrapable retailers
  workflow_dispatch:          # lets you run it manually from the Actions tab
permissions:
  contents: write
jobs:
  prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Fetch prices & images
        run: node scripts/fetch-prices.mjs
      - name: Commit if changed
        run: |
          git config user.name  "baby-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet && echo "no price changes" && exit 0
          git commit -m "price update $(date -u +%F)"
          # rebase onto any commits that landed since checkout, then push — retry to survive races
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash -X theirs origin main && git push && exit 0
            echo "push race, retry $i…"; sleep 5
          done
          echo "push failed after retries"; exit 1
