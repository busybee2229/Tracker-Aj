<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Baby Deal Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f6f1ec;--card:#fff;--ink:#2b2b33;--muted:#80808c;--line:#ece6e1;--accent:#6b8caf;--accent-d:#4f7193;
--soft:#eef3f8;--deal:#1f9d6b;--dealbg:#e0f3ea;--day1:#2e7d57;--day1bg:#d8efe2;--weeks:#8a6d1a;--weeksbg:#fcf1cf;
--later:#a85a3b;--laterbg:#f6e1d6;--opt:#777;--optbg:#ededed;--own:#3a7a3a;--ownbg:#e6efe6}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.45}
header{background:linear-gradient(135deg,#6b8caf,#88a8c6);color:#fff;padding:16px 20px}
header h1{margin:0;font-size:20px;font-weight:700}
header .sub{font-size:12.5px;opacity:.92;margin-top:3px}
.wrap{max-width:1180px;margin:0 auto;padding:14px 16px 70px}
.banner{background:#fff7e6;border:1px solid #f0d98a;color:#7a5b00;font-size:12.5px;padding:9px 12px;border-radius:9px;margin:10px 0}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin:14px 0}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:.12s}
.stat:hover{border-color:var(--accent);transform:translateY(-1px)}
.stat.active{border-color:var(--accent);background:var(--soft);box-shadow:0 0 0 2px var(--accent) inset}
.stat .n{font-size:23px;font-weight:700;color:var(--accent)} .stat.deal .n{color:var(--deal)}
.stat .l{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
.controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:8px 0}
input[type=search]{flex:1;min-width:160px;padding:9px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px}
.chip{border:1px solid var(--line);background:#fff;border-radius:20px;padding:6px 12px;font-size:12.5px;cursor:pointer;white-space:nowrap}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip.deal.on{background:var(--deal);border-color:var(--deal)}
.minibtn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 11px;font-size:12px;cursor:pointer;color:var(--ink)}
.minibtn:hover{border-color:var(--accent)}
.acc{background:var(--card);border:1px solid var(--line);border-radius:12px;margin:10px 0;overflow:hidden}
.acc>.head{display:flex;align-items:center;gap:10px;padding:13px 15px;cursor:pointer;user-select:none;background:linear-gradient(0deg,#fbf8f4,#fff)}
.acc>.head .chev{transition:.2s;color:var(--accent);font-size:13px}
.acc.open>.head .chev{transform:rotate(90deg)}
.acc>.head h2{font-size:14.5px;margin:0;flex:1;letter-spacing:.3px}
.acc>.head .cnt{font-size:12px;color:var(--muted);background:var(--soft);border-radius:20px;padding:2px 9px}
.acc>.body{display:none;padding:6px 12px 12px}
.acc.open>.body{display:block}
.item{display:flex;gap:12px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px;margin:8px 0;align-items:flex-start}
.item.isdeal{border-color:var(--deal);box-shadow:0 0 0 1px var(--deal) inset}
.item.untracked{opacity:.5}
.thumb{width:74px;height:74px;border-radius:10px;flex:0 0 auto;background:#f0ece8;border:1px solid var(--line);overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb .ph{font-size:10px;color:#b7b0a8;text-align:center;padding:4px;line-height:1.2}
.body2{flex:1;min-width:0}
.row1{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap}
.name{font-weight:650;font-size:15.5px;flex:1;min-width:140px;cursor:pointer}
.name:hover{color:var(--accent-d)}
.badges{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.b{font-size:10px;font-weight:700;padding:3px 7px;border-radius:6px;text-transform:uppercase;letter-spacing:.3px}
.b.day1{background:var(--day1bg);color:var(--day1)}.b.weeks{background:var(--weeksbg);color:var(--weeks)}
.b.later{background:var(--laterbg);color:var(--later)}.b.opt{background:var(--optbg);color:var(--opt)}
.b.owned{background:var(--ownbg);color:var(--own)}.b.buy{background:var(--soft);color:var(--accent-d)}
.b.confirm{background:var(--weeksbg);color:var(--weeks)}.b.deal{background:var(--deal);color:#fff}
.recline{font-size:13.5px;color:#3a3a42;margin:5px 0 2px}
.haveline{font-size:13px;color:var(--own);font-weight:600;margin:5px 0}
.meta{display:flex;gap:13px;flex-wrap:wrap;font-size:12.5px;color:var(--muted);margin-top:4px}
.meta b{color:var(--ink)}
.price{margin-top:7px;font-size:13px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.price .cur{font-weight:700;font-size:15px}.price .drop{color:var(--deal);font-weight:700}.price .avg{color:var(--muted)}
.spark{height:34px;max-width:160px}
.actions{display:flex;gap:7px;margin-top:9px;flex-wrap:wrap}
.bestbtn{background:var(--accent);color:#fff;border:none;border-radius:9px;padding:8px 13px;font-size:13px;font-weight:650;text-decoration:none;display:inline-flex;gap:6px;align-items:center;cursor:pointer}
.bestbtn:hover{background:var(--accent-d)}
.lk{font-size:12.5px;text-decoration:none;padding:7px 11px;border-radius:8px;border:1px solid var(--line);color:var(--ink);background:#fafafa;display:inline-flex;gap:5px;align-items:center}
.lk:hover{background:var(--soft);border-color:var(--accent)}
.detail{display:none;margin-top:10px;border-top:1px dashed var(--line);padding-top:10px}
.item.expanded .detail{display:block}
.opt{border:1px solid var(--line);border-radius:10px;padding:10px;margin:7px 0;background:#fcfbfa}
.opt.best{border-color:var(--accent);background:var(--soft)}
.opt .otop{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.opt .rank{font-size:10px;font-weight:800;color:#fff;background:var(--accent);border-radius:6px;padding:2px 7px}
.opt .rank.alt{background:#b9b3ab}
.opt .oname{font-weight:650;font-size:14px}
.opt .owhy{font-size:12.5px;color:var(--muted);margin:3px 0 7px}
.opt .links{display:flex;gap:7px;flex-wrap:wrap}
.del{border:none;background:none;color:#c98;cursor:pointer;font-size:16px;line-height:1;padding:2px 4px}
.del:hover{color:#c33}
.trk{font-size:11px;border:1px solid var(--line);background:#fff;border-radius:7px;padding:4px 9px;cursor:pointer;color:var(--muted)}
.trk.on{background:var(--ownbg);color:var(--own);border-color:#a9cbb6;font-weight:700}
.notes{font-size:12px;color:#8a8a8a;margin-top:7px;font-style:italic}
.foot{margin-top:24px;font-size:12px;color:var(--muted);text-align:center;line-height:1.7}
.foot a{color:var(--accent-d)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;align-items:center;justify-content:center;padding:16px}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:14px;max-width:440px;width:100%;padding:18px}
.modal h3{margin:0 0 12px}
.modal label{display:block;font-size:12px;color:var(--muted);margin:9px 0 3px}
.modal input,.modal select{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:14px}
.modal .mrow{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
@media(max-width:560px){.thumb{width:58px;height:58px}.stat .n{font-size:19px}}
</style></head><body>
<header><h1>👶 Baby Deal Tracker</h1>
<div class="sub">India · UK · Canada — cheapest in ₹ &nbsp;|&nbsp; <span id="updated"></span></div></header>
<div class="wrap">
  <div id="livebanner" class="banner"></div>
  <div class="cards" id="stats"></div>
  <div class="controls">
    <input type="search" id="q" placeholder="Search items or brands…"/>
    <span class="chip deal" data-f="deal">🔥 Deals</span>
    <span class="chip" data-f="tracked">👁 Tracked</span>
  </div>
  <div class="controls">
    <span class="minibtn" id="expandAll">Expand all</span>
    <span class="minibtn" id="collapseAll">Collapse all</span>
    <span style="flex:1"></span>
    <span class="minibtn" id="exportBtn">⬇ Export edits</span>
    <span class="minibtn" id="importBtn">⬆ Import</span>
    <input type="file" id="importFile" accept="application/json" style="display:none"/>
  </div>
  <div id="list"></div>
  <div class="foot" id="foot"></div>
</div>

<div class="overlay" id="overlay"><div class="modal">
  <h3 id="mtitle">Add product</h3>
  <label>Item name</label><input id="m_item" placeholder="e.g. Night light"/>
  <label>Category</label><select id="m_cat"></select>
  <label>Recommended product / brand</label><input id="m_pick" placeholder="e.g. VAVA Night Light"/>
  <label>India link (optional)</label><input id="m_in" placeholder="https://…"/>
  <label>UK link (optional)</label><input id="m_uk" placeholder="https://…"/>
  <label>Canada link (optional)</label><input id="m_ca" placeholder="https://…"/>
  <div class="mrow"><span class="minibtn" id="m_cancel">Cancel</span><span class="bestbtn" id="m_save">Save</span></div>
</div></div>

const FLAG={india:"🇮🇳",uk:"🇬🇧",canada:"🇨🇦"};
const CATS=["CLOTHING","HYGIENE & HEALTH","BASICS & GEAR","EXTRAS"];
const bcls={"Day 1":"day1","Day 1*":"day1","First weeks":"weeks","Later":"later","Optional":"opt","Owned":"owned","-":"opt"};
let PRICES={}, IMAGES={};
const LS=(k,d)=>JSON.parse(localStorage.getItem(k)||d);
let TRACK=LS("track","{}"), HIDDEN=LS("hidden","{}"), USER=LS("useritems","[]"), OPEN=LS("accopen","null");
if(OPEN===null){OPEN={};CATS.forEach(c=>OPEN[c]=true);}
const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const isTracked=id=>TRACK[id]!==false;
const inr=n=>"₹"+(+n||0).toLocaleString("en-IN");
const state={q:"",stat:"",deal:false,tracked:false};

function allItems(){ return PRODUCTS.filter(p=>!HIDDEN[p.id]).concat(USER); }
function bestRegion(p){ const b=(p.best||"").toLowerCase();
  if(b.includes("india"))return"india"; if(b.includes("uk")||b.includes("m&s")||b.includes("next")||b.includes("boots"))return"uk";
  if(b.includes("ca")||b.includes("canada")||b.includes("costco")||b.includes("carter"))return"canada"; return"india"; }

async function loadPrices(){
  const b=document.getElementById("livebanner");
  try{ const r=await fetch("./prices.json",{cache:"no-store"});
    if(r.ok){ const j=await r.json(); const items=j.items||{}; IMAGES=j.images||{};
      for(const id in items){ PRICES[id]=items[id].map(x=>({date:new Date(x.date).getTime(),inr:+x.inr,region:x.region||""})).filter(x=>!isNaN(x.date)&&x.inr); }
      Object.values(PRICES).forEach(a=>a.sort((x,y)=>x.date-y.date));
      if(Object.keys(PRICES).length||Object.keys(IMAGES).length){ b.style.display="none"; if(j.updated)document.getElementById("updated").textContent="updated "+j.updated; return; }
    }
  }catch(e){}
  b.innerHTML="📊 <b>Live prices & photos populate after the first GitHub Action run.</b> The hourly/twice-daily job writes <code>prices.json</code> (current ₹ prices, recent averages, deal flags) and product images. For now you can browse the full plan, top-3 options and three-country links.";
}
function priceInfo(id){ const h=PRICES[id]||[]; if(!h.length)return null;
  const cur=h[h.length-1].inr; const cut=Date.now()-CONFIG.AVG_WINDOW_DAYS*864e5;
  const win=h.filter(x=>x.date>=cut); const arr=win.length?win:h;
  const avg=Math.round(arr.reduce((s,x)=>s+x.inr,0)/arr.length);
  return {cur,avg,isDeal:cur<avg&&cur<=avg*(1-CONFIG.DEAL_THRESHOLD),hist:h.slice(-20)}; }

let sparks=[];
function optCard(o,i){
  const links=["india","uk","canada"].map(k=>o[k]?`<a class="lk" target="_blank" rel="noopener" href="${o[k]}">${FLAG[k]} ${k[0].toUpperCase()+k.slice(1)}</a>`:"").join("");
  return `<div class="opt ${i===0?'best':''}"><div class="otop"><span class="rank ${i===0?'':'alt'}">${i===0?'★ BEST':'ALT '+(i+1)}</span><span class="oname">${o.name}</span></div>`+
    (o.why?`<div class="owhy">${o.why}</div>`:"")+`<div class="links">${links}</div></div>`;
}
function itemCard(p){
  const pi=isTracked(p.id)?priceInfo(p.id):null; p._pi=pi;
  const pri=p.priority||"-", pc=bcls[pri]||"opt", stc={Buy:"buy",Owned:"owned",Confirm:"confirm"}[p.status]||"opt";
  const isDeal=pi&&pi.isDeal;
  const img=IMAGES[p.id];
  const thumb=`<div class="thumb">${img?`<img src="${img}" alt="" onerror="this.parentNode.innerHTML='<div class=ph>photo loads<br>after sync</div>'">`:`<div class="ph">photo loads<br>after sync</div>`}</div>`;
  const best=p.options&&p.options[0]; const br=bestRegion(p); const bl=best?(best[br]||best.india||best.uk||best.canada):"";
  let price="";
  if(pi){ price=`<div class="price"><span class="cur">${inr(pi.cur)}</span>`+(pi.isDeal?`<span class="drop">▼ below avg ${inr(pi.avg)}</span>`:`<span class="avg">avg ${inr(pi.avg)}</span>`)+`<canvas class="spark" id="sp${p.id}"></canvas></div>`; sparks.push(p.id); }
  let detail="";
  if(p.options&&p.options.length){ detail=`<div class="detail">${p.options.map(optCard).join("")}</div>`; }
  else if(p.owned){ detail=`<div class="detail"><div class="opt best"><div class="otop"><span class="rank">✓ OWNED</span><span class="oname">${p.owned}</span></div></div></div>`; }
  const badges=`<div class="badges">`+(isDeal?`<span class="b deal">🔥 Deal</span>`:"")+
    `<span class="b ${pc}">${pri}</span><span class="b ${stc}">${p.status}</span>`+
    `<button class="trk ${isTracked(p.id)?'on':''}" onclick="toggleTrack('${p.id}')">${isTracked(p.id)?'Tracking ✓':'Track'}</button>`+
    `<button class="del" title="Delete" onclick="delItem('${p.id}')">✕</button></div>`;
  const have=p.owned?`<div class="haveline">✓ Have: ${p.owned}</div>`:"";
  const rec=(best&&best.name&&p.status!=="Owned")?`<div class="recline">✓ ${best.name}${best.why?' — '+best.why:''}</div>`:"";
  const meta=`<div class="meta">`+(p.qty?`<span>Qty <b>${p.qty}</b></span>`:"")+(p.best&&p.best!=="-"?`<span>Best <b>${p.best}</b></span>`:"")+`</div>`;
  let actions=`<div class="actions">`;
  if(best&&bl&&p.status!=="Owned") actions+=`<a class="bestbtn" target="_blank" rel="noopener" href="${bl}">★ Buy best (${br[0].toUpperCase()+br.slice(1)}) ↗</a>`;
  if((p.options&&p.options.length)||p.owned) actions+=`<span class="lk" onclick="toggleDetail(this)">Top options ▾</span>`;
  actions+=`</div>`;
  return `<div class="item ${isDeal?'isdeal':''} ${isTracked(p.id)?'':'untracked'}" data-id="${p.id}">${thumb}<div class="body2">`+
    `<div class="row1"><div class="name" onclick="toggleDetail(this)">${p.item}</div>${badges}</div>`+
    have+rec+meta+price+actions+detail+(p.notes&&p.notes.trim()?`<div class="notes">${p.notes}</div>`:"")+`</div></div>`;
}
window.toggleDetail=function(el){ el.closest(".item").classList.toggle("expanded"); drawSparks(); };
window.toggleTrack=function(id){ TRACK[id]=isTracked(id)?false:true; save("track",TRACK); render(); };
window.delItem=function(id){ if(!confirm("Remove this item from your tracker?"))return;
  if(String(id).startsWith("u")){ USER=USER.filter(x=>String(x.id)!==String(id)); save("useritems",USER);} else {HIDDEN[id]=1; save("hidden",HIDDEN);} render(); };

function passFilter(p){
  if(state.q){const s=(p.item+" "+(p.options||[]).map(o=>o.name+" "+o.why).join(" ")+" "+p.category+" "+(p.owned||"")).toLowerCase(); if(!s.includes(state.q.toLowerCase()))return false;}
  if(state.deal && !(p._pi&&p._pi.isDeal))return false;
  if(state.tracked && !isTracked(p.id))return false;
  if(state.stat==="day1" && !(p.priority||"").startsWith("Day 1"))return false;
  if(state.stat==="buy" && p.status!=="Buy")return false;
  if(state.stat==="owned" && p.status!=="Owned")return false;
  if(state.stat==="deal" && !(p._pi&&p._pi.isDeal))return false;
  return true;
}
function render(){
  const L=document.getElementById("list"); L.innerHTML=""; sparks=[];
  const items=allItems(); items.forEach(p=>{ p._pi=isTracked(p.id)?priceInfo(p.id):null; });
  let shown=0;
  CATS.forEach(cat=>{
    const list=items.filter(p=>p.category===cat && passFilter(p));
    if(!list.length && (state.q||state.deal||state.tracked||state.stat))return;
    shown+=list.length;
    const open=OPEN[cat]!==false || !!(state.q||state.stat||state.deal);
    const acc=document.createElement("div"); acc.className="acc"+(open?" open":"");
    acc.innerHTML=`<div class="head"><span class="chev">▶</span><h2>${cat}</h2><span class="cnt">${list.length}</span><span class="minibtn" onclick="event.stopPropagation();addItem('${cat}')">＋ Add</span></div><div class="body"></div>`;
    acc.querySelector(".head").onclick=()=>{ acc.classList.toggle("open"); OPEN[cat]=acc.classList.contains("open"); save("accopen",OPEN); drawSparks(); };
    acc.querySelector(".body").innerHTML=list.map(itemCard).join("")||'<p style="color:#aaa;padding:8px">No items.</p>';
    L.appendChild(acc);
  });
  if(!shown)L.innerHTML='<p style="color:#999;text-align:center;padding:30px">No items match.</p>';
  document.getElementById("foot").innerHTML=`Showing ${shown} items. FX £1=₹${CONFIG.FX.GBP}, C$1=₹${CONFIG.FX.CAD}. Prices are guidance — confirm at checkout. Edits (add/delete/track) are saved in this browser; use Export to move them between devices.`;
  drawSparks();
}
function drawSparks(){ sparks.forEach(id=>{ const el=document.getElementById("sp"+id); if(!el||el._d)return; el._d=1; const h=(PRICES[id]||[]).slice(-20);
  new Chart(el,{type:"line",data:{labels:h.map(_=>""),datasets:[{data:h.map(x=>x.inr),borderColor:"#6b8caf",borderWidth:1.5,pointRadius:0,tension:.3}]},options:{responsive:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}},animation:false}});}); }

function stats(){
  const items=allItems();
  const c={items:items.length,day1:items.filter(p=>(p.priority||"").startsWith("Day 1")).length,
    buy:items.filter(p=>p.status==="Buy").length,owned:items.filter(p=>p.status==="Owned").length,
    deal:items.filter(p=>isTracked(p.id)&&priceInfo(p.id)?.isDeal).length};
  const defs=[["","items","Items"],["day1","day1","Day-1"],["buy","buy","To buy"],["owned","owned","Owned"],["deal","deal","🔥 Deals"]];
  document.getElementById("stats").innerHTML=defs.map(([k,key,l])=>
    `<div class="stat ${key==='deal'?'deal':''} ${state.stat===k?'active':''}" data-stat="${k}"><div class="n">${c[key]}</div><div class="l">${l}</div></div>`).join("");
  document.querySelectorAll("[data-stat]").forEach(e=>e.onclick=()=>{ state.stat=state.stat===e.dataset.stat?"":e.dataset.stat; if(e.dataset.stat==="")state.stat=""; stats(); render(); });
}
document.getElementById("q").oninput=e=>{state.q=e.target.value;render()};
document.querySelectorAll("[data-f]").forEach(e=>e.onclick=()=>{state[e.dataset.f]=!state[e.dataset.f];e.classList.toggle("on");render()});
document.getElementById("expandAll").onclick=()=>{CATS.forEach(c=>OPEN[c]=true);save("accopen",OPEN);render()};
document.getElementById("collapseAll").onclick=()=>{CATS.forEach(c=>OPEN[c]=false);save("accopen",OPEN);render()};

// Add/Import/Export
const ov=document.getElementById("overlay");
window.addItem=function(cat){ document.getElementById("m_cat").innerHTML=CATS.map(c=>`<option ${c===cat?'selected':''}>${c}</option>`).join("");
  ["m_item","m_pick","m_in","m_uk","m_ca"].forEach(id=>document.getElementById(id).value=""); ov.classList.add("show"); };
document.getElementById("m_cancel").onclick=()=>ov.classList.remove("show");
ov.onclick=e=>{if(e.target===ov)ov.classList.remove("show")};
document.getElementById("m_save").onclick=()=>{ const item=document.getElementById("m_item").value.trim(); if(!item){alert("Enter a name");return;}
  const o={name:document.getElementById("m_pick").value.trim()||item,why:"",india:document.getElementById("m_in").value.trim(),uk:document.getElementById("m_uk").value.trim(),canada:document.getElementById("m_ca").value.trim()};
  USER.push({id:"u"+Date.now(),category:document.getElementById("m_cat").value,item,priority:"Later",status:"Buy",qty:"",best:"-",notes:"Added by you.",owned:"",options:[o]});
  save("useritems",USER); ov.classList.remove("show"); stats(); render(); };
document.getElementById("exportBtn").onclick=()=>{ const blob=new Blob([JSON.stringify({track:TRACK,hidden:HIDDEN,useritems:USER},null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="baby-tracker-edits.json"; a.click(); };
document.getElementById("importBtn").onclick=()=>document.getElementById("importFile").click();
document.getElementById("importFile").onchange=e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader();
  r.onload=()=>{try{const j=JSON.parse(r.result); if(j.track){TRACK=j.track;save("track",TRACK);} if(j.hidden){HIDDEN=j.hidden;save("hidden",HIDDEN);} if(j.useritems){USER=j.useritems;save("useritems",USER);} stats();render();alert("Edits imported.");}catch(x){alert("Invalid file");}}; r.readAsText(f); };

document.getElementById("updated").textContent="loaded "+new Date().toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
(async()=>{ await loadPrices(); stats(); render(); })();
</script></body></html>
